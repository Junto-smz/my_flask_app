{% extends "base.html" %}

{% block title %}支出登録{% endblock %}

{% block content %}
    <h2>支出登録</h2>

    <form method="post">
        <div>
            <label for="name">カテゴリ名</label>
            <input type="text" id="name" name="name">
        </div>

        <div>
            <label for="amount">金額</label>
            <input type="number" id="amount" name="amount">
        </div>

        <button type="submit">登録</button>
    </form>
{% endblock %}
