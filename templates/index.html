{% extends "base.html" %}

{% block title %}支出一覧{% endblock %}

{% block content %}
    <p>{{ description }}</p>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>カテゴリ</th>
            <th>金額</th>
            <th>操作</th>
        </tr>
        {% for expense in expenses %}
            <tr>
                <td>{{ expense.id }}</td>
                <td>{{ expense.name }}</td>
                <td>{{ expense.amount }}円</td>
                <td>
                    <a href="{{ url_for('edit_expense', expense_id=expense.id) }}">編集</a>

                    <form method="post" action="{{ url_for('delete_expense', expense_id=expense.id) }}">
                        <button type="submit">削除</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
    </table>

    <p>合計金額：{{ total_amount }}円</p>
{% endblock %}
