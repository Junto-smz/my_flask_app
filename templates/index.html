<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
</head>
<body>
    <h1>{{ app_name }}</h1>
    <p>{{ description }}</p>

    <h2>支出一覧</h2>
    <ul>
        {% for expense in expenses %}
            <li>{{ expense.name }}：{{ expense.amount }}円</li>
        {% endfor %}
    </ul>
    <p>合計金額:{{total_amount}}円</p>
</body>
</html>
